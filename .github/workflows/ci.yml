name: CI Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/homework5-app
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/homework5-frontend

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Run unit tests
        run: mvn -Dtest=HomeworkTest test

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        run: |
          docker build -t $BACKEND_IMAGE:${{ github.sha }} .
          docker tag $BACKEND_IMAGE:${{ github.sha }} $BACKEND_IMAGE:latest

      - name: Build frontend Docker image
        run: |
          docker build -t $FRONTEND_IMAGE:${{ github.sha }} ./frontend
          docker tag $FRONTEND_IMAGE:${{ github.sha }} $FRONTEND_IMAGE:latest

      - name: Run backend container test
        run: |
          docker run -d -p 8080:8080 --name app-test \
            -e APP_ENV=test \
            -e APP_VERSION=${{ github.sha }} \
            -e PORT=8080 \
            $BACKEND_IMAGE:${{ github.sha }}

          sleep 8
          curl -f http://localhost:8080/health
          curl -f http://localhost:8080/version

      - name: Remove backend test container
        if: always()
        run: docker rm -f app-test || true

      - name: Push backend Docker image
        if: github.event_name == 'push'
        run: |
          docker push $BACKEND_IMAGE:${{ github.sha }}
          docker push $BACKEND_IMAGE:latest

      - name: Push frontend Docker image
        if: github.event_name == 'push'
        run: |
          docker push $FRONTEND_IMAGE:${{ github.sha }}
          docker push $FRONTEND_IMAGE:latest