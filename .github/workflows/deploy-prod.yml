name: Deploy Prod

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: [self-hosted, Windows, X64, devops]
    environment: prod

    steps:
      # 🔐 Login GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 📦 Pull latest images (важно!)
      - name: Pull images
        shell: powershell
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/homework5-app:latest
          docker pull ghcr.io/${{ github.repository_owner }}/homework5-frontend:latest

      # 🧱 Генерирај compose (без cache проблем)
      - name: Create prod compose file
        shell: powershell
        run: |
          @'
          services:
            frontend:
              image: ghcr.io/${{ github.repository_owner }}/homework5-frontend:latest
              ports:
                - "5001:80"
              depends_on:
                - backend
              networks:
                - app-net

            backend:
              image: ghcr.io/${{ github.repository_owner }}/homework5-app:latest
              environment:
                - APP_ENV=prod
                - APP_VERSION=latest
                - PORT=8080
              ports:
                - "8083:8080"
              networks:
                - app-net

          networks:
            app-net:
              driver: bridge
          '@ | Set-Content docker-compose.prod.generated.yml

      # 🔍 Debug (да видиш што се стартува)
      - name: Show generated compose
        shell: powershell
        run: |
          Get-Content docker-compose.prod.generated.yml

      # 🛑 Stop старо
      - name: Stop old prod containers
        shell: powershell
        run: |
          docker compose -p homework5-prod -f docker-compose.prod.generated.yml down --remove-orphans

      # 🚀 START (НАЈВАЖНО – force recreate)
      - name: Start prod environment
        shell: powershell
        run: |
          docker compose -p homework5-prod -f docker-compose.prod.generated.yml pull
          docker compose -p homework5-prod -f docker-compose.prod.generated.yml up -d --force-recreate

      # 🩺 Backend check
      - name: Check backend health
        shell: powershell
        run: |
          Start-Sleep -Seconds 8
          curl http://localhost:8083/health

      # 🌐 Frontend check
      - name: Check frontend
        shell: powershell
        run: |
          curl http://localhost:5001