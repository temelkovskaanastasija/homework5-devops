services:
  frontend:
    image: ghcr.io/temelkovskaanastasija/homework5-frontend:latest
    ports:
      - "5000:80"
    depends_on:
      - backend
    networks:
      - app-net

  backend:
    image: ghcr.io/temelkovskaanastasija/homework5-app:latest
    environment:
      - APP_ENV=dev
      - APP_VERSION=latest
      - PORT=8080
    ports:
      - "8082:8080"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge