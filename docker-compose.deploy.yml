version: "3.8"

services:

  nginx:
    image: nginx:latest
    container_name: bg-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/active_upstream.conf:/etc/nginx/conf.d/active_upstream.conf
    depends_on:
      - app-blue
      - app-green
    networks:
      - bg-net

  app-blue:
    image: ghcr.io/temelkovskaanastasija/homework5-app:latest
    container_name: app-blue
    environment:
      - APP_ENV=blue
      - PORT=8080
    networks:
      - bg-net

  app-green:
    image: ghcr.io/temelkovskaanastasija/homework5-app:latest
    container_name: app-green
    environment:
      - APP_ENV=green
      - PORT=8080
    networks:
      - bg-net

networks:
  bg-net: